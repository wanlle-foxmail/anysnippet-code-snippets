# Redis 7.4 baseline settings for a new deployment.

# Replace loopback-only binding with private addresses if clients connect from other hosts.
bind 127.0.0.1 -::1
protected-mode yes

# Prefer ACLs for Redis 6+ instead of a shared requirepass value.
# Create the ACL file before startup, or switch to requirepass instead.
aclfile /etc/redis/users.acl

# Use a non-default port to reduce background scan noise.
port 6380

# Let Redis cooperate with systemd or another Linux service manager.
supervised auto

# Persist snapshots and append-only files under an explicit data directory.
# Ensure this directory already exists and has the correct permissions.
dir /var/lib/redis
dbfilename dump.rdb
save 3600 1 300 100 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# Keep both RDB snapshots and AOF enabled for recovery options.
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# Write operational logs to a dedicated file.
# Ensure the parent log directory already exists.
loglevel notice
logfile /var/log/redis/redis-server.log

# Keep idle connections detectable and reduce Linux THP side effects.
tcp-keepalive 300
disable-thp yes

# Keep slow command visibility enabled.
slowlog-log-slower-than 10000
slowlog-max-len 128